<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Winstreak" />
  <meta name="theme-color" content="#080810" />
  <title>Winstreak ⚡</title>
  <!-- PWA : installation sur l'écran d'accueil + hors-ligne -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <!-- ── En-tête ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-eyebrow">⚡ Winstreak</div>
    <div class="date-big" id="date-big"></div>
    <div class="day-name" id="day-name"></div>
    <div class="streak-badge" id="streak-badge">⚡ La journée commence !</div>
  </header>

  <!-- ── Onglets ─────────────────────────────────────────── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today">⚡ Aujourd'hui</button>
    <button class="tab-btn"        data-tab="stats">📊 Stats</button>
    <button class="tab-btn"        data-tab="team">👥 Team</button>
    <button class="tab-btn"        data-tab="settings">⚙️ Réglages</button>
  </nav>

  <!-- ── Onglet : Aujourd'hui ────────────────────────────── -->
  <section id="panel-today">
    <div class="card">
      <div class="card-header">
        <span class="card-icon">⚡</span>
        <span class="card-title">Habitudes du jour</span>
      </div>
      <div id="habits-list"></div>
    </div>

    <div class="summary-card">
      <div class="summary-pct pct-zero" id="summary-pct">0%</div>
      <div class="summary-label">complété aujourd'hui</div>
      <div class="summary-track">
        <div class="summary-fill" id="summary-fill" style="width:0%"></div>
      </div>
      <div class="summary-count" id="summary-count">0 / 0</div>
      <div class="perfect-msg" id="perfect-msg">🔥 Journée parfaite ! Tu es inarrêtable !</div>
    </div>
  </section>

  <!-- ── Onglet : Statistiques ───────────────────────────── -->
  <section id="panel-stats" style="display:none">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-val" id="s-streak">—</div>
        <div class="stat-lbl">Série actuelle</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-val" id="s-perfect">—</div>
        <div class="stat-lbl">Jours parfaits</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-val" id="s-days">—</div>
        <div class="stat-lbl">Jours suivis</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-val" id="s-global">—</div>
        <div class="stat-lbl">Réussite globale</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-icon">🗓</span>
        <span class="card-title">7 derniers jours</span>
      </div>
      <div class="week-wrap" id="week-dots"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-icon">📈</span>
        <span class="card-title">Détail par habitude</span>
      </div>
      <div id="habit-stats"></div>
    </div>
  </section>

  <!-- ── Onglet : Team (version entre potes) ─────────────── -->
  <section id="panel-team" style="display:none"></section>

  <!-- ── Onglet : Paramètres ─────────────────────────────── -->
  <section id="panel-settings" style="display:none">
    <div class="card">
      <div class="card-header">
        <span class="card-icon">🎨</span>
        <span class="card-title">Apparence</span>
      </div>
      <label class="theme-toggle">
        <span class="theme-label">🌙 Mode sombre</span>
        <span class="switch">
          <input type="checkbox" id="theme-switch" />
          <span class="track"><span class="knob"></span></span>
        </span>
      </label>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-icon">✏️</span>
        <span class="card-title">Mes habitudes</span>
      </div>
      <div id="settings-list"></div>
      <button class="btn" id="btn-add">➕ Ajouter une habitude</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-icon">💾</span>
        <span class="card-title">Sauvegarde des données</span>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-export">⬇️ Exporter</button>
        <button class="btn" id="btn-import">⬆️ Importer</button>
      </div>
      <!-- champ caché pour choisir un fichier à importer -->
      <input type="file" id="import-file" accept="application/json" style="display:none" />
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<!-- Scripts chargés dans l'ordre : config → storage → stats → app -->
<script src="config.js"></script>
<script src="storage.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>

<!-- Version "entre potes" (cloud Supabase) — optionnelle -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="cloud.js"></script>

<!-- Enregistrement du service worker (mode hors-ligne / app installable) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
